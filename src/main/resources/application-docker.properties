# Docker profile - for local docker-compose development
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Database - will be overridden by docker-compose env vars
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chaintrack}
spring.datasource.username=${DB_USERNAME:chaintrack_user}
spring.datasource.password=${DB_PASSWORD:chaintrack_password}

# JWT - will be overridden by docker-compose env var
jwt.secret=${JWT_SECRET:chaintrack-docker-secret-key-change-in-production}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Frontend CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}