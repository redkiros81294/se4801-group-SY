spring.profiles.active=test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console for debugging
spring.h2.console.enabled=true

# Disable Flyway in tests — PostgreSQL-only SQL files (V1–V7) break H2 startup.
# Schema is fully created by Hibernate ddl-auto=create-drop instead.
spring.flyway.enabled=false

# JWT test secret
jwt.secret=test-jwt-secret-key-for-testing-only-not-for-production