spring.application.name=chaintrack
spring.profiles.active=dev
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Database (dev defaults, override with env vars)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chaintrack}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# JWT
jwt.secret=${JWT_SECRET:default-secret-key-change-in-production}

# Frontend CORS
frontend.url=${FRONTEND_URL:http://localhost:3000}
