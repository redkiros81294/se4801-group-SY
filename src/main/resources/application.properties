spring.application.name=chaintrack
server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.cache.disabled=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Database (dev defaults, override with env vars)
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5536/chaintrack}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:chaintrack_user}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:chaintrack_password}}

# JWT
jwt.secret=${JWT_SECRET:default-secret-key-change-in-production}

# Frontend CORS
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
