version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chaintrack
      POSTGRES_USER: chaintrack_user
      POSTGRES_PASSWORD: chaintrack_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaintrack_user -d chaintrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://db:5432/chaintrack
      DB_USERNAME: chaintrack_user
      DB_PASSWORD: chaintrack_password
      JWT_SECRET: ${JWT_SECRET:-chaintrack-super-secret-key-that-is-long-enough-for-hs512-alg}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/verify/health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres-data: