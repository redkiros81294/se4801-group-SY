version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chaintrack
      POSTGRES_USER: chaintrack_user
      POSTGRES_PASSWORD: chaintrack_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaintrack_user -d chaintrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/chaintrack
      SPRING_DATASOURCE_USERNAME: chaintrack_user
      SPRING_DATASOURCE_PASSWORD: chaintrack_password
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-here}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - .:/app
      - /app/target

volumes:
  postgres-data: