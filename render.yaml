services:
  - type: web
    name: chaintrack-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: chaintrack
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: chaintrack
          property: username
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: chaintrack
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://chaintrack-frontend.onrender.com
    healthCheckPath: /actuator/health
    buildCommand: mvn -B -DskipTests package

  - type: postgresql
    name: chaintrack
    plan: free