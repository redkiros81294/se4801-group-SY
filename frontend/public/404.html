<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ChainTrack - Page Not Found</title>
    <script>
      // SPA redirect: send all 404s to index.html with the pathname stored
      const basePath = '/se4801-group-SY/';
      const path = window.location.pathname;
      // Remove basePath prefix if present
      const cleanPath = path.startsWith(basePath) ? path.slice(basePath.length) : path;
      // Redirect to index with the attempted path
      sessionStorage.redirect = basePath + '?' + cleanPath;
      window.location.replace(basePath);
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
